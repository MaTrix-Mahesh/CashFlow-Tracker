<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CashFlow Tracker</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <div class="app-container">
        <header>
            <div class="brand">
                <h1>CashFlow Tracker</h1>
                <p>Track your cash flow with ease</p>
            </div>
            <button id="theme-toggle" class="theme-btn">
                <span id="theme-icon">🌙</span>
            </button>
        </header>

        <div class="stats-grid">
            <div class="stat-card blue">
                <span class="label">Total Salary</span>
                <h2 id="display-salary">₹0</h2>
            </div>
            <div class="stat-card orange">
                <span class="label">Total Expenses</span>
                <h2 id="display-expenses">₹0</h2>
            </div>
            <div class="stat-card green" id="balance-card">
                <span class="label">Remaining Balance</span>
                <h2 id="display-balance">₹0</h2>
            </div>
        </div>

        <main class="main-layout">
            <aside class="card pane">
                <div class="form-group">
                    <h3>Monthly Income</h3>
                    <div class="input-wrapper">
                        <input type="number" id="salary-input" placeholder="e.g. 50000">
                        <button id="set-salary-btn">Set Salary</button>
                    </div>
                </div>

                <div class="form-group divider">
                    <h3>Add Transaction</h3>
                    <label>Expense Name</label>
                    <input type="text" id="expense-name" placeholder="Rent, Food, etc.">
                    <label>Amount</label>
                    <input type="number" id="expense-amount" placeholder="₹ Amount">
                    <button id="add-expense-btn" class="btn-success">Add Expense</button>
                </div>
            </aside>

            <section class="card pane">
                <h3>Recent Transactions</h3>
                <div class="scroll-area">
                    <ul id="expense-list">
                        </ul>
                </div>
            </section>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
